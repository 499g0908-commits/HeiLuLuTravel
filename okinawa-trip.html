<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🖤 黑嚕嚕之旅 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a3d62 0%, #1e6091 40%, #2980b9 100%);
      min-height: 100vh;
      color: #2c3e50;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 40px 20px 20px;
      color: white;
    }
    header h1 {
      font-size: 2.4rem;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header p {
      margin-top: 8px;
      font-size: 1rem;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    /* ── Layout ── */
    .tab-wrapper {
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 16px;
      display: flex;
      gap: 0;
      align-items: flex-start;
    }

    /* ── Sidebar Tabs ── */
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      width: 120px;
    }

    .tab-btn {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      border-right: none;
      padding: 12px 10px;
      border-radius: 10px 0 0 10px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
      text-align: center;
      line-height: 1.5;
    }
    .tab-btn:hover {
      background: rgba(255,255,255,0.25);
    }
    .tab-btn.active {
      background: white;
      color: #1e6091;
      border-color: white;
      position: relative;
      z-index: 1;
    }

    /* ── Content Card ── */
    .card {
      background: white;
      border-radius: 0 16px 16px 16px;
      padding: 32px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      flex: 1;
      min-width: 0;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Day Title ── */
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e8f4fd;
    }
    .day-badge {
      background: linear-gradient(135deg, #1e6091, #2980b9);
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .day-header h2 { font-size: 1.4rem; color: #1e6091; }
    .day-header small { color: #7f8c8d; font-size: 0.9rem; }

    /* ── Summary Chips ── */
    .summary-chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f0f8ff;
      border: 1px solid #bee3f8;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: #2c6e9c;
    }
    .chip.empty {
      background: #fafafa;
      border-color: #e0e0e0;
      color: #aaa;
      font-style: italic;
    }
    .chip-icon { font-size: 1rem; }

    /* ── Timeline ── */
    .timeline {
      position: relative;
      padding-left: 90px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 54px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #bee3f8, #e8f4fd);
    }

    .time-slot {
      position: relative;
      margin-bottom: 4px;
      min-height: 48px;
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .time-label {
      position: absolute;
      left: -90px;
      top: 12px;
      width: 46px;
      text-align: right;
      font-size: 0.75rem;
      font-weight: 700;
      color: #95a5a6;
      letter-spacing: 0.5px;
    }

    /* dot on the line */
    .time-slot::before {
      content: '';
      position: absolute;
      left: -38px;
      top: 18px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #bee3f8;
      border: 2px solid white;
      box-shadow: 0 0 0 2px #bee3f8;
      z-index: 1;
    }
    .time-slot.has-event::before {
      background: #1e6091;
      box-shadow: 0 0 0 3px rgba(30,96,145,0.2);
    }

    .event-content {
      flex: 1;
      padding: 8px 14px;
      border-radius: 8px;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .event-content.empty {
      color: #ddd;
      font-size: 0.78rem;
    }

    .event-content.filled {
      background: linear-gradient(135deg, #ebf8ff, #f0f9ff);
      border-left: 3px solid #1e6091;
      color: #2c3e50;
      font-size: 0.88rem;
    }

    .event-content.flight {
      background: linear-gradient(135deg, #fff5f5, #fff0f0);
      border-left: 3px solid #e53e3e;
    }
    .event-content.hotel {
      background: linear-gradient(135deg, #f0fff4, #ebfff4);
      border-left: 3px solid #38a169;
    }
    .event-content.food {
      background: linear-gradient(135deg, #fffaf0, #fff8f0);
      border-left: 3px solid #dd6b20;
    }
    .event-content.activity {
      background: linear-gradient(135deg, #faf5ff, #f5f0ff);
      border-left: 3px solid #805ad5;
    }

    .event-inner { display: flex; align-items: center; gap: 8px; }
    .event-icon { font-size: 1.1rem; }
    .event-text { line-height: 1.4; }
    .event-text strong { display: block; font-size: 0.88rem; }
    .event-text span { font-size: 0.78rem; color: #7f8c8d; }

    /* placeholder dashes for empty day */
    .no-event-label { color: #ccc; font-size: 0.75rem; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🖤 黑嚕嚕之旅</h1>
  <p>2025 年 10 月 3 日 ─ 10 月 10 日 &nbsp;|&nbsp; 8 天 7 夜</p>
</header>

<div class="tab-wrapper">
  <div class="tabs" id="tabs"></div>
  <div class="card" id="tab-panels"></div>
</div>

<footer>✈️ 行程資料持續更新中 — 航班與住宿確認後將補入</footer>

<script>
  // ── 行程資料 ──────────────────────────────────────────────
  // type: 'flight' | 'hotel' | 'food' | 'activity' | ''
  const days = [
    {
      date: '10/03', weekday: '六', label: 'Day 1',
      summary: { flight: 'IT736｜TPE 06:35 → ISG 08:35', hotel: 'Third｜石垣島', note: '出發日｜飛往新石垣島' },
      events: {
        '06': { type: 'flight', icon: '✈️', title: 'IT736 出發', desc: '桃園機場 T1 06:35 → 新石垣機場 08:35' },
        '08': { type: 'flight', icon: '🛬', title: '抵達新石垣島 (ISG)', desc: '落地時間 08:35' },
        '15': { type: 'hotel', icon: '🏨', title: 'Check-in｜Third', desc: '石垣島' },
      }
    },
    {
      date: '10/04', weekday: '日', label: 'Day 2',
      summary: { flight: '', hotel: 'Third｜石垣島', note: '石垣島探索' },
      events: {}
    },
    {
      date: '10/05', weekday: '一', label: 'Day 3',
      summary: { flight: '', hotel: 'Third｜石垣島', note: '石垣島探索' },
      events: {}
    },
    {
      date: '10/06', weekday: '二', label: 'Day 4',
      summary: { flight: '', hotel: 'Third｜石垣島', note: '石垣島探索' },
      events: {}
    },
    {
      date: '10/07', weekday: '三', label: 'Day 5',
      summary: { flight: 'RAC834｜ISG 14:50 → MMY 15:20', hotel: 'Hilton｜宮古島', note: '石垣島 → 宮古島（國內線）' },
      events: {
        '14': { type: 'flight', icon: '✈️', title: 'RAC834 出發', desc: '石垣機場 14:50 → 宮古機場 15:20' },
        '15': { type: 'flight', icon: '🛬', title: '抵達宮古島 (MMY)', desc: '落地時間 15:20' },
        '17': { type: 'hotel', icon: '🏨', title: 'Check-in｜Hilton 宮古島', desc: '宮古島希爾頓' },
      }
    },
    {
      date: '10/08', weekday: '四', label: 'Day 6',
      summary: { flight: '', hotel: 'Hilton｜宮古島', note: '宮古島探索' },
      events: {}
    },
    {
      date: '10/09', weekday: '五', label: 'Day 7',
      summary: { flight: '', hotel: '住一宮古島店', note: '宮古島探索' },
      events: {
        '12': { type: 'hotel', icon: '🏨', title: 'Check-out｜Hilton 宮古島', desc: '' },
        '15': { type: 'hotel', icon: '🏨', title: 'Check-in｜住一宮古島店', desc: '宮古島' },
      }
    },
    {
      date: '10/10', weekday: '六', label: 'Day 8',
      summary: { flight: 'JX891｜SHI 14:00 → TPE 15:10', hotel: '', note: '回程日｜下地島 → 台北' },
      events: {
        '14': { type: 'flight', icon: '✈️', title: 'JX891 出發', desc: '下地島機場 14:00 → 桃園機場 T1 15:10（台灣時間）' },
        '15': { type: 'flight', icon: '🛬', title: '抵達台灣 (TPE)', desc: '桃園機場 T1 落地 15:10' },
      }
    },
  ];

  const hours = Array.from({ length: 18 }, (_, i) => String(i + 6).padStart(2, '0')); // 06:00–23:00

  // ── Render ────────────────────────────────────────────────
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('tab-panels');

  days.forEach((day, idx) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.innerHTML = `<span>${day.label}</span><br><small>${day.date}（${day.weekday}）</small>`;
    btn.onclick = () => switchTab(idx);
    tabsEl.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'tab-content' + (idx === 0 ? ' active' : '');
    panel.id = `panel-${idx}`;

    // Summary chips
    const chips = buildChips(day.summary);
    // Timeline
    const timeline = buildTimeline(day.events);

    panel.innerHTML = `
      <div class="day-header">
        <div class="day-badge">${day.label.replace('Day ', 'D')}</div>
        <div>
          <h2>2025 年 ${day.date}（${day.weekday}）</h2>
          <small>${day.summary.note || '行程待規劃'}</small>
        </div>
      </div>
      <div class="summary-chips">${chips}</div>
      <div class="timeline">${timeline}</div>
    `;
    panelsEl.appendChild(panel);
  });

  function buildChips(s) {
    let html = '';
    if (s.flight) {
      html += `<div class="chip"><span class="chip-icon">✈️</span>${s.flight}</div>`;
    }
    if (s.hotel) {
      html += `<div class="chip"><span class="chip-icon">🏨</span>${s.hotel}</div>`;
    }
    if (!s.flight && !s.hotel) {
      html += `<div class="chip empty">✈️ 航班待確認</div><div class="chip empty">🏨 住宿待確認</div>`;
    } else {
      if (!s.flight) html += `<div class="chip empty">✈️ 無班機</div>`;
      if (!s.hotel) html += `<div class="chip empty">🏨 住宿待確認</div>`;
    }
    return html;
  }

  function buildTimeline(events) {
    return hours.map(h => {
      const ev = events[h];
      const hasEvent = !!ev;
      const timeLabel = `${h}:00`;
      let content = '';
      if (ev) {
        content = `
          <div class="event-content filled ${ev.type || ''}">
            <div class="event-inner">
              <span class="event-icon">${ev.icon || '📌'}</span>
              <div class="event-text">
                <strong>${ev.title}</strong>
                ${ev.desc ? `<span>${ev.desc}</span>` : ''}
              </div>
            </div>
          </div>`;
      } else {
        content = `<div class="event-content empty"><span class="no-event-label">─</span></div>`;
      }
      return `
        <div class="time-slot ${hasEvent ? 'has-event' : ''}">
          <span class="time-label">${timeLabel}</span>
          ${content}
        </div>`;
    }).join('');
  }

  function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    document.querySelectorAll('.tab-content').forEach((p, i) => p.classList.toggle('active', i === idx));
  }
</script>
</body>
</html>
